name: Auto Scraper
on:
push:
branches: [ main ]
schedule:
- cron: '0 0 * * *' # 每天北京时间早上8点运行
jobs:
build:
runs-on: ubuntu-latest
steps:
- uses: actions/checkout@v2
- name: Run Scraper
run: python scraper.py
- name: Deploy
uses: peaceiris/actions-gh-pages@v3
with:
github_token: ${{ secrets.GITHUB_TOKEN }}
publish_dir: ./
