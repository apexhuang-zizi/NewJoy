# VERSION: 2026-MAY-DEBUG-001
name: FINAL_SCRAPER_WORKFLOW
on:
  push:
    branches: [ main ]
  workflow_dispatch: 

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: 🚀 STEP_1_CHECKOUT
        uses: actions/checkout@v4

      - name: 🚀 STEP_2_PYTHON_ENV
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🚀 STEP_3_DEPENDENCIES
        run: pip install requests

      - name: 🚀 STEP_4_RUN_PYTHON_NOW
        env:
          MY_PROXY_URL: ${{ secrets.PROXY_URL }}
        run: python scraper.py

      - name: 🚀 STEP_5_UPLOAD
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 🚀 STEP_6_DEPLOY
        uses: actions/deploy-pages@v4
