name: Daily News Scraper & Email

on:
  workflow_dispatch: # 手动触发
  schedule:
    # 每天 UTC 时间 01:00 运行，即越南/北京时间 08:00 (根据你的位置计算)
    - cron: '0 1 * * *'

permissions:
  contents: write  # 允许机器人提交代码（解决 403 报错）
  pages: write     # 允许更新网页
  id-token: write  # 用于安全验证

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # 关键：获取所有历史记录，防止拉取失败
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Execute Scraper
        env:
          MY_PROXY_URL: ${{ secrets.PROXY_URL }}
        run: python scraper.py

      - name: Commit and Push update
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          # 如果没有变化就退出，不报错
          git commit -m "Auto-update trends" || exit 0
          # 关键操作：先拉取远程改动并强制合并
          git pull origin main --rebase
          git push origin main

      - name: Send Email Notification
        if: success() # 只有上面成功了才发邮件
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: 🚀 每日技术趋势报告 (Hacker News)
          to: ${{ secrets.MAIL_RECEIVER }}
          from: "Trend Monitor Agent"
          body: |
            你好！今天的技术资讯已经抓取完成并同步至你的网页。
            查看链接：https://github.com/${{ github.repository }}
          attachments: index.html
