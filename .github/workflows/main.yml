name: Core_Data_Scraper
on:
  push:
    branches: [ main ]
  workflow_dispatch: 

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    # 强制指定在 GitHub Actions 模式下运行
    steps:
      - name: Checkout_Repo
        uses: actions/checkout@v4

      - name: Setup_Python_Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install_Dependencies
        run: pip install requests

      - name: Execute_Scraper_Logic
        env:
          MY_PROXY_URL: ${{ secrets.PROXY_URL }}
        run: python scraper.py

      - name: Prepare_Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Final_Deployment
        uses: actions/deploy-pages@v4
