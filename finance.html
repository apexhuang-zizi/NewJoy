
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>金融看板</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f4f8; padding: 20px; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .full { grid-column: span 2; }
        .chart { height: 300px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
    </style>
</head>
<body>
    <div style='text-align:center;margin:20px;'><a href='index.html'>技术</a> | <a href='news.html'>要闻</a> | <a href='finance.html'>金融</a></div><hr>
    <div class="dashboard">
        <div class="card">
            <h3>📈 美元/人民币 (USD/CNY)</h3>
            <div id="chart_usdcny" class="chart"></div>
        </div>
        <div class="card">
            <h3>🇻🇳 1k 人民币兑越南盾</h3>
            <div id="chart_vndcny" class="chart"></div>
        </div>
        <div class="card full">
            <h3>✈️ 南航直达票价追踪 (SGN-CAN)</h3>
            <div id="chart_flight" class="chart"></div>
            <table>
                <tr style="background:#f7fafc;"><th>航班号</th><th>价格 (CNY)</th><th>时间</th></tr>
                <tr><td colspan='3'>今日未抓取到南航直达</td></tr>
            </table>
        </div>
    </div>
    <div style="text-align:center; margin-top:20px;">
        <a href="history.csv" download>📥 下载历史数据 (CSV)</a>
    </div>

    <script>
        var dates = ["2026-05-15"];
        function makeChart(id, title, name, data, color) {
            var c = echarts.init(document.getElementById(id));
            c.setOption({
                tooltip: { trigger: 'axis' },
                xAxis: { data: dates },
                yAxis: { scale: true },
                series: [{ name: name, type: 'line', data: data, color: color, smooth: true }]
            });
        }
        makeChart('chart_usdcny', 'USD/CNY', '汇率', [6.8092], '#e53e3e');
        makeChart('chart_vndcny', 'VND/CNY', '越南盾', [0.2584], '#3182ce');
        
        var cFlight = echarts.init(document.getElementById('chart_flight'));
        cFlight.setOption({
            tooltip: { trigger: 'axis' },
            legend: { data: ['14天后趋势', '2027-02-01'] },
            xAxis: { data: dates },
            yAxis: { scale: true },
            series: [
                { name: '14天后趋势', type: 'line', data: [0], color: '#f59e0b', smooth: true },
                { name: '2027-02-01', type: 'line', data: [0], color: '#805ad5', smooth: true }
            ]
        });
    </script>
</body>
</html>
